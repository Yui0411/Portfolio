name: Build and Deploy

# Runs on every push to main (e.g. when a PR is merged).
on:
  push:
    branches: [main]

# Required for OIDC: lets the job request a short-lived token to assume the AWS role.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: portfolio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # --- CI gates: stop the deploy if these fail ---
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      # --- Authenticate to AWS with OIDC (no stored keys) ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Build the image and push it to ECR (tagged latest + commit SHA) ---
      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          # Secrets passed as env vars (not inlined into the command) so a stray
          # newline in a value can't break the build command.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" -t "$IMAGE:latest" -t "$IMAGE:$IMAGE_TAG" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$IMAGE_TAG"

      # --- Deploy: SSH into EC2, pull the new image, restart the container ---
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            sudo docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            sudo docker rm -f portfolio || true
            sudo docker run -d --restart unless-stopped --name portfolio -p 127.0.0.1:3000:3000 ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            sudo docker image prune -f
